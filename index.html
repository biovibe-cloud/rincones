    // Fuerza a que el navegador baje siempre la versión más nueva de estos

    // recarga forzada (Ctrl/Cmd+Shift+R) después de publicar cambios.
    var __v = Date.now();
    function __loadLocal(src, isJsx) {
      document.write('<script' + (isJsx ? ' type="text/babel"' : '') + ' src="' + src + '?v=' + __v + '"><' + '/script>');
    }
    __loadLocal('data.js', false);
    __loadLocal('store.js', false);
    __loadLocal('themes.jsx', true);
    __loadLocal('shared.jsx', true);
    __loadLocal('pages.jsx', true);
    __loadLocal('editor.jsx', true);
    __loadLocal('app.jsx', true);
